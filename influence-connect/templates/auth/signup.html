{% extends "base.html" %}
{% block title %}Sign Up — Influence Connect{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width: 520px;">
    <h2>Create account</h2>
    <p class="auth-subtitle">Join as a {{ role }}</p>

    <div class="role-tabs">
      <a href="{{ url_for('auth.signup', role='brand') }}" class="role-tab {% if role == 'brand' %}active{% endif %}" data-role="brand">🏢 Brand</a>
      <a href="{{ url_for('auth.signup', role='influencer') }}" class="role-tab {% if role == 'influencer' %}active{% endif %}" data-role="influencer">⭐ Influencer</a>
    </div>

    <form method="POST" action="{{ url_for('auth.signup', role=role) }}">
      <input type="hidden" name="role" value="{{ role }}">

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
        </div>
      </div>

      {% if role == 'brand' %}
      <div class="form-group">
        <label for="company_name">Company Name *</label>
        <input type="text" id="company_name" name="company_name" placeholder="Your Brand Name" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="industry">Industry</label>
          <input type="text" id="industry" name="industry" placeholder="e.g. Beauty, Tech">
        </div>
        <div class="form-group">
          <label for="website">Website</label>
          <input type="url" id="website" name="website" placeholder="https://...">
        </div>
      </div>
      <div class="form-group">
        <label for="description">About your brand</label>
        <textarea id="description" name="description" placeholder="Tell influencers about your brand..."></textarea>
      </div>

      {% elif role == 'influencer' %}
      <div class="form-group">
        <label for="full_name">Full Name *</label>
        <input type="text" id="full_name" name="full_name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label for="category_id">Category *</label>
        <select id="category_id" name="category_id" required>
          <option value="">Select a category</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}">{{ cat.icon }} {{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="instagram_handle">Instagram Handle *</label>
        <input type="text" id="instagram_handle" name="instagram_handle" placeholder="@yourhandle" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="followers">Followers</label>
          <input type="number" id="followers" name="followers" placeholder="125000" min="0">
        </div>
        <div class="form-group">
          <label for="monthly_reach">Monthly Reach</label>
          <input type="number" id="monthly_reach" name="monthly_reach" placeholder="450000" min="0">
        </div>
      </div>
      <div class="form-group">
        <label for="monthly_pricing">Monthly Pricing (₹) *</label>
        <input type="number" id="monthly_pricing" name="monthly_pricing" placeholder="25000" required min="0" step="100">
      </div>
      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" placeholder="Tell brands about your content..."></textarea>
      </div>
      {% endif %}

      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="{{ url_for('auth.login', role=role) }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
